<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Oil can body -->
  <g transform="translate(100,85)">
    <!-- Can body -->
    <ellipse cx="0" cy="10" rx="25" ry="8" fill="#0F3D3E"/>
    <rect x="-25" y="-15" width="50" height="25" rx="0" fill="#0F3D3E"/>
    <ellipse cx="0" cy="-15" rx="25" ry="8" fill="#1a5253"/>
    <!-- Label stripe -->
    <rect x="-25" y="-5" width="50" height="10" fill="#0F3D3E"/>
    <rect x="-20" y="-3" width="40" height="6" rx="1" fill="none" stroke="#FFB703" stroke-width="1"/>
    <!-- Spout -->
    <path d="M20,-15 L45,-40 L48,-38 L25,-13" fill="#64748B"/>
    <!-- Handle on top -->
