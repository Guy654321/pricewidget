<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Wrench -->
  <g transform="translate(70,80) rotate(-20)">
    <rect x="-5" y="-25" width="10" height="40" rx="4" fill="#0F3D3E"/>
    <path d="M-10,-25 C-10,-35 -6,-40 0,-40 C6,-40 10,-35 10,-25 L5,-25 C5,-31 3,-34 0,-34 C-3,-34 -5,-31 -5,-25 Z" fill="#0F3D3E"/>
    <rect x="-6" y="12" width="12" height="5" rx="1" fill="#64748B"/>
  </g>
  <!-- Checklist -->
  <g transform="translate(120,45)">
    <!-- Clipboard -->
    <rect x="0" y="0" width="45" height="60" rx="4" fill="none" stroke="#0F3D3E" stroke-width="2"/>
    <rect x="12" y="-4" width="20" height="8" rx="3" fill="#0F3D3E"/>
    <!-- Check items -->
    <rect x="8" y="14" width="8" height="8" rx="1" fill="none" stroke="#64748B" stroke-width="1.5"/>
    <path d="M10,18 L13,21 L18,14" fill="none" stroke="#FFB703" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="20" y1="18" x2="38" y2="18" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="8" y="28" width="8" height="8" rx="1" fill="none" stroke="#64748B" stroke-width="1.5"/>
    <path d="M10,32 L13,35 L18,28" fill="none" stroke="#FFB703" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="20" y1="32" x2="35" y2="32" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="8" y="42" width="8" height="8" rx="1" fill="none" stroke="#64748B" stroke-width="1.5"/>
    <line x1="20" y1="46" x2="38" y2="46" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>