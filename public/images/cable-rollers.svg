  </g>
  <g transform="translate(100,120)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#0F3D3E" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#FFB703"/>
    <line x1="0" y1="-12" x2="0" y2="-20" stroke="#64748B" stroke-width="1.5"/>
  </g>
  <g transform="translate(140,120)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#0F3D3E" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#FFB703"/>
    <line x1="0" y1="-12" x2="0" y2="-20" stroke="#64748B" stroke-width="1.5"/>
  </g>
