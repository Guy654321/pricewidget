<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Opener unit body -->
  <rect x="45" y="45" width="110" height="50" rx="6" fill="#0F3D3E"/>
  <!-- Front panel detail -->
  <rect x="50" y="50" width="100" height="40" rx="4" fill="none" stroke="#64748B" stroke-width="1"/>
  <!-- Light/lens -->
  <circle cx="100" cy="100" r="5" fill="#FFB703"/>
  <!-- Mounting rail -->
  <line x1="100" y1="95" x2="100" y2="105" stroke="#64748B" stroke-width="2"/>
  <!-- Rail extending down -->
  <rect x="95" y="105" width="10" height="25" rx="2" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <!-- Power indicator -->
  <circle cx="140" cy="58" r="3" fill="#FFB703" opacity="0.8"/>
</svg>