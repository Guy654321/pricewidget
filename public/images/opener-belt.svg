<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Sleek opener body -->
  <rect x="30" y="35" width="140" height="45" rx="8" fill="#0F3D3E"/>
  <rect x="35" y="40" width="130" height="35" rx="5" fill="none" stroke="#64748B" stroke-width="1"/>
  <!-- Chamberlain text -->
  <text x="90" y="55" font-family="Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle" letter-spacing="1">CHAMBERLAIN</text>
  <!-- WiFi waves icon -->
  <g transform="translate(148,52)">
    <path d="M-8,-6 C-4,-10 4,-10 8,-6" fill="none" stroke="#FFB703" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-5,-3 C-2,-6 2,-6 5,-3" fill="none" stroke="#FFB703" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#FFB703"/>
  </g>
  <!-- Belt drive rail (smooth) -->
  <rect x="88" y="80" width="24" height="6" rx="3" fill="#64748B"/>
  <!-- Belt (smooth line, no chain links) -->
  <line x1="30" y1="92" x2="170" y2="92" stroke="#0F3D3E" stroke-width="3" stroke-linecap="round"/>
  <!-- Smooth belt surface indicator -->
  <line x1="40" y1="92" x2="160" y2="92" stroke="#64748B" stroke-width="1" opacity="0.5"/>
  <!-- Trolley -->
  <rect x="92" y="98" width="16" height="20" rx="3" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <!-- LED -->
  <circle cx="100" cy="125" r="3" fill="#FFB703"/>
</svg>