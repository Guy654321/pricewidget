<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Opener unit body -->
  <rect x="35" y="35" width="130" height="50" rx="6" fill="#0F3D3E"/>
  <rect x="40" y="40" width="120" height="40" rx="4" fill="none" stroke="#64748B" stroke-width="1"/>
  <!-- Chamberlain text -->
  <text x="100" y="57" font-family="Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle" letter-spacing="1">CHAMBERLAIN</text>
  <!-- Power LED -->
  <circle cx="145" cy="50" r="3" fill="#FFB703"/>
  <!-- Chain drive rail -->
  <rect x="90" y="85" width="20" height="8" rx="2" fill="#64748B"/>
  <!-- Chain pattern -->
  <g transform="translate(0,97)">
    <line x1="30" y1="0" x2="170" y2="0" stroke="#64748B" stroke-width="2"/>
    <!-- Chain links -->
    <circle cx="40" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="52" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="64" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="76" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="88" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="100" cy="0" r="3" fill="none" stroke="#FFB703" stroke-width="1.5"/>
    <circle cx="112" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="124" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="136" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="148" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
    <circle cx="160" cy="0" r="3" fill="none" stroke="#0F3D3E" stroke-width="1.5"/>
  </g>
  <!-- Trolley -->
  <rect x="93" y="105" width="14" height="18" rx="2" fill="none" stroke="#64748B" stroke-width="1.5"/>
</svg>