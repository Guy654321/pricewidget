<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Opener unit body -->
  <rect x="40" y="40" width="120" height="55" rx="6" fill="#0F3D3E"/>
  <!-- Front panel -->
  <rect x="45" y="45" width="110" height="45" rx="4" fill="none" stroke="#64748B" stroke-width="1"/>
  <!-- Diagnostic display screen -->
  <rect x="60" y="52" width="40" height="24" rx="3" fill="#1a5253"/>
  <rect x="63" y="55" width="34" height="18" rx="2" fill="#0a2e2f"/>
  <!-- Screen content lines -->
  <line x1="66" y1="60" x2="84" y2="60" stroke="#FFB703" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="66" y1="65" x2="78" y2="65" stroke="#FFB703" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="66" y1="70" x2="90" y2="70" stroke="#FFB703" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Status LEDs -->
  <circle cx="120" cy="58" r="3" fill="#FFB703"/>
  <circle cx="130" cy="58" r="3" fill="#64748B"/>
  <circle cx="140" cy="58" r="3" fill="#64748B"/>
  <!-- Light -->
  <circle cx="100" cy="100" r="4" fill="#FFB703"/>
  <!-- Rail -->
  <rect x="95" y="95" width="10" height="25" rx="2" fill="none" stroke="#64748B" stroke-width="1.5"/>
</svg>