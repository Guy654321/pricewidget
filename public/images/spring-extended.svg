<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Spring coil (center) -->
  <g transform="translate(100,65)">
    <path d="M-25,-20 C-25,-20 -12,-25 0,-18 C12,-11 12,-6 0,-2 C-12,2 -12,7 0,11 C12,15 12,18 0,22" fill="none" stroke="#0F3D3E" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="-20" x2="-35" y2="-26" stroke="#0F3D3E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="10" y2="28" stroke="#0F3D3E" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Left cable -->
  <line x1="25" y1="100" x2="65" y2="39" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  <!-- Right cable -->
  <line x1="175" y1="100" x2="110" y2="93" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  <!-- Cable hardware (small brackets) -->
  <rect x="18" y="97" width="14" height="10" rx="2" fill="none" stroke="#0F3D3E" stroke-width="2"/>
  <rect x="168" y="97" width="14" height="10" rx="2" fill="none" stroke="#0F3D3E" stroke-width="2"/>
  <!-- Hardware pins -->
  <circle cx="25" cy="112" r="3" fill="#FFB703"/>
  <circle cx="175" cy="112" r="3" fill="#FFB703"/>
  <!-- Bottom cable line -->
  <line x1="25" y1="112" x2="25" y2="125" stroke="#64748B" stroke-width="1.5"/>
  <line x1="175" y1="112" x2="175" y2="125" stroke="#64748B" stroke-width="1.5"/>
</svg>