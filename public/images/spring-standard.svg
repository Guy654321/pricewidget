<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Single torsion spring coil -->
  <g transform="translate(100,80)">
    <!-- Spring helix -->
    <path d="M-30,-35 C-30,-35 -15,-40 0,-30 C15,-20 15,-15 0,-10 C-15,-5 -15,0 0,5 C15,10 15,15 0,20 C-15,25 -15,30 0,35 C15,40 15,42 5,45" fill="none" stroke="#0F3D3E" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Top arm -->
    <line x1="-30" y1="-35" x2="-45" y2="-45" stroke="#0F3D3E" stroke-width="3" stroke-linecap="round"/>
    <!-- Bottom arm -->
    <line x1="5" y1="45" x2="20" y2="55" stroke="#0F3D3E" stroke-width="3" stroke-linecap="round"/>
    <!-- Accent dot at center -->
    <circle cx="0" cy="5" r="2.5" fill="#FFB703"/>
  </g>
</svg>