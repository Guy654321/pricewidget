<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="12" ry="12" fill="#f1f5f9"/>
  <!-- Wrench (left) -->
  <g transform="translate(45,80) rotate(-15)">
    <rect x="-4" y="-20" width="8" height="32" rx="3" fill="#0F3D3E"/>
    <path d="M-8,-20 C-8,-28 -4,-32 0,-32 C4,-32 8,-28 8,-20 L4,-20 C4,-25 2,-27 0,-27 C-2,-27 -4,-25 -4,-20 Z" fill="#0F3D3E"/>
  </g>
  <!-- Rollers (center) -->
  <g transform="translate(100,85)">
    <!-- Roller 1 -->
    <circle cx="-12" cy="0" r="10" fill="none" stroke="#0F3D3E" stroke-width="2"/>
    <circle cx="-12" cy="0" r="4" fill="#FFB703"/>
    <!-- Roller 2 -->
    <circle cx="12" cy="0" r="10" fill="none" stroke="#0F3D3E" stroke-width="2"/>
    <circle cx="12" cy="0" r="4" fill="#FFB703"/>
    <!-- Axle stems -->
    <line x1="-12" y1="-14" x2="-12" y2="-22" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="-14" x2="12" y2="-22" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <!-- Mounting bracket -->
    <line x1="-16" y1="-22" x2="16" y2="-22" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Pressure gauge (right) -->
  <g transform="translate(155,65)">
    <!-- Gauge body -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#0F3D3E" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#64748B" stroke-width="0.5"/>
    <!-- Gauge markings -->
    <line x1="0" y1="-14" x2="0" y2="-11" stroke="#64748B" stroke-width="1"/>
    <line x1="11" y1="-8" x2="9" y2="-6" stroke="#64748B" stroke-width="1"/>
    <line x1="14" y1="0" x2="11" y2="0" stroke="#64748B" stroke-width="1"/>
    <line x1="-14" y1="0" x2="-11" y2="0" stroke="#64748B" stroke-width="1"/>
    <line x1="-11" y1="-8" x2="-9" y2="-6" stroke="#64748B" stroke-width="1"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="8" y2="-8" stroke="#FFB703" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2.5" fill="#0F3D3E"/>
    <!-- Stem -->
    <rect x="-3" y="18" width="6" height="10" rx="2" fill="#64748B"/>
  </g>
</svg>